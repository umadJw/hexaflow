  function PhotoSection({ data, onSave }) {
    const cellPhotos = data.cellPhotos || {};
    const [photos, setPhotos] = React.useState(cellPhotos.graphic || []);
    const [uploading, setUploading] = React.useState(false);
    const [progress, setProgress] = React.useState(0);
    const [toast, showToast] = useToast();
    const dropRef = React.useRef(null);

    const save = (ph) => {
      const next = { ...cellPhotos, graphic: ph };
      onSave({ cellPhotos: next });
      /* inject into live cells */
      const liveCells = (window.__LIVE_CELLS || window.PORTFOLIO_DATA.cells).map(c =>
        c.id === "graphic" ? { ...c, photos: ph } : c
      );
      window.__LIVE_CELLS = liveCells;
      window.PORTFOLIO_DATA.cells = window.PORTFOLIO_DATA.cells.map(c =>
        c.id === "graphic" ? { ...c, photos: ph } : c
      );
      window.dispatchEvent(new CustomEvent("ld-cells-updated"));
    };

    const handleFiles = async (files) => {
      setUploading(true);
      const results=[];
      const arr=Array.from(files).filter(f=>f.type.startsWith("image/"));
      for(let i=0;i<arr.length;i++){
        setProgress(Math.round((i/arr.length)*85));
        const c=await compressImage(arr[i]);
        /* upload compressed image to Supabase Storage */
        let storageUrl = null;
        try {
          const compressedFile = dataUrlToFile(c.dataUrl, arr[i].name.replace(/\.[^.]+$/, ".jpg"));
          const uploaded = await storageUpload("photos", compressedFile, "image/jpeg");
          if (uploaded) storageUrl = uploaded.url;
        } catch(e) { console.warn("[Upload] Storage failed, keeping dataUrl:", e); }
        results.push({
          id: Date.now()+i,
          dataUrl: c.dataUrl,          /* local preview / fallback */
          storageUrl: storageUrl,       /* Supabase public URL */
          displayUrl: storageUrl || c.dataUrl,  /* used for display */
          name: arr[i].name, w:c.w, h:c.h,
          origSize:Math.round(c.origSize/1024),
          newSize:Math.round(c.newSize/1024),
          title:"", description:"",
          uploadedAt:new Date().toISOString()
        });
      }
      setProgress(100);
      const next=[...results,...photos];
      setPhotos(next); save(next);
      setUploading(false);setProgress(0);
      const allUploaded = results.every(r => r.storageUrl);
      const someUploaded = results.some(r => r.storageUrl);
      if (allUploaded)  showToast("✓ "+results.length+" création(s) → Supabase Storage");
      else if (someUploaded) showToast("⚠ Partiellement uploadé — vérifiez la session");
      else              showToast("✓ "+results.length+" création(s) (local — reconnectez-vous pour Supabase)");
    };

    const moveUp=(i)=>{if(i===0)return;const a=[...photos];[a[i-1],a[i]]=[a[i],a[i-1]];setPhotos(a);save(a);};
    const moveDown=(i)=>{if(i===photos.length-1)return;const a=[...photos];[a[i],a[i+1]]=[a[i+1],a[i]];setPhotos(a);save(a);};
    const del=(id)=>{if(!confirm("Supprimer cette création ?"))return;const n=photos.filter(p=>p.id!==id);setPhotos(n);save(n);};
    const upd=(id,patch)=>{const n=photos.map(p=>p.id===id?{...p,...patch}:p);setPhotos(n);save(n);};

    return (
      <div>
        <Toast msg={toast}/>
        <div className="adm-section-title">Graphic Design</div>
        <div className="adm-section-meta">— CRÉATIONS · 6 CARRÉS · PANNEAU DÉTAILS</div>

        <div ref={dropRef} className="adm-upload-zone" style={{marginBottom:24}}
          onClick={()=>document.getElementById("adm-img-input").click()}
          onDrop={e=>{e.preventDefault();dropRef.current.classList.remove("drag-over");handleFiles(e.dataTransfer.files);}}
          onDragOver={e=>{e.preventDefault();dropRef.current.classList.add("drag-over");}}
          onDragLeave={()=>dropRef.current.classList.remove("drag-over")}>
          <input id="adm-img-input" type="file" multiple accept="image/*" style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
          <div style={{fontSize:26,marginBottom:8,color:"rgba(212,165,116,0.4)"}}>◈</div>
          <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:11,letterSpacing:"0.25em",color:"var(--bone-dim)"}}>DÉPOSER DES CRÉATIONS ICI</div>
          <div style={{fontFamily:"Inter,sans-serif",fontSize:12,color:"rgba(185,177,163,0.4)",marginTop:6}}>JPEG 82% auto · les 6 premières s'affichent dans l'hexagone</div>
          {uploading&&<div style={{marginTop:14}}><div style={{fontFamily:"JetBrains Mono,monospace",fontSize:9,letterSpacing:"0.2em",color:"var(--gold)",marginBottom:6}}>COMPRESSION… {progress}%</div><div className="adm-progress-bar"><div className="adm-progress-fill" style={{width:progress+"%"}}/></div></div>}
        </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:9,letterSpacing:"0.3em",color:"var(--bone-dim)"}}>{photos.length} CRÉATION{photos.length!==1?"S":""} · {Math.min(photos.length,6)} VISIBLE{Math.min(photos.length,6)!==1?"S":""} DANS L'HEXAGONE</div>
        </div>

        {photos.length === 0 && <div style={{fontFamily:"Inter,sans-serif",fontSize:13,color:"rgba(185,177,163,0.3)",padding:"20px 0"}}>Aucune création. Uploadez vos visuels graphiques.</div>}
        {photos.map((p,i)=>(
          <PhotoAdminCard key={p.id} p={p} i={i}
            onUpdate={upd} onMoveUp={()=>moveUp(i)} onMoveDown={()=>moveDown(i)} onDelete={()=>del(p.id)}
            isFirst={i===0} isLast={i===photos.length-1} />
        ))}

  function AdminLogin({ onAuth, onBack }) {
    const [email, setEmail] = React.useState("");
    const [pw,    setPw]    = React.useState("");
    const [show,  setShow]  = React.useState(false);
    const [err,   setErr]   = React.useState("");
    const [loading, setLoading] = React.useState(false);

    const attempt = async () => {
      if (!email.trim() || !pw) { setErr("Email et mot de passe requis."); return; }
      setLoading(true); setErr("");
      try {
        const { data, error } = await _supa.auth.signInWithPassword({
          email: email.trim().toLowerCase(),
          password: pw,
        });
        if (error) throw error;
        if (data?.session) {
          onAuth(data.session);
        } else {
          throw new Error("Aucune session retournée.");
        }
      } catch (e) {
        setErr(e.message === "Invalid login credentials"
          ? "Email ou mot de passe incorrect."
          : e.message);
        setPw("");
      }
      setLoading(false);
    };

    return (
      <div className="adm-overlay">
        {/* ── back button top-left ── */}
        <button
          onClick={onBack}
          style={{
            position:"absolute", top:24, left:28,
            background:"transparent", border:"none",
            color:"rgba(185,177,163,0.4)", cursor:"pointer",
            fontFamily:"JetBrains Mono,monospace", fontSize:10,
            letterSpacing:"0.25em", display:"flex", alignItems:"center", gap:8,
            transition:"color 200ms", padding:"6px 0",
          }}
          onMouseEnter={e=>e.currentTarget.style.color="var(--bone-dim)"}
          onMouseLeave={e=>e.currentTarget.style.color="rgba(185,177,163,0.4)"}>
          ← RETOUR AU SITE
        </button>

        <div className="adm-card">
          <div className="adm-logo">
            <div style={{width:26,height:30,clipPath:"polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)",background:"linear-gradient(135deg,var(--gold),var(--gold-deep))",flexShrink:0}}/>
            <div><div className="adm-title">Lea Dimas</div><div className="adm-sub">ADMIN STUDIO</div></div>
          </div>

          <div className="adm-field-group">
            <label className="adm-label">EMAIL</label>
            <input className="adm-input" type="email" value={email}
              onChange={e=>setEmail(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&attempt()}
              placeholder="hello@leadimas.studio"
              autoFocus autoComplete="email" />
          </div>

          <div className="adm-field-group">
            <label className="adm-label">MOT DE PASSE</label>
            <div style={{position:"relative"}}>
              <input className="adm-input" type={show?"text":"password"} value={pw}
                onChange={e=>setPw(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&attempt()}
                placeholder="••••••••"
                autoComplete="current-password" />
              <button onClick={()=>setShow(s=>!s)}
                style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--bone-dim)",cursor:"pointer",fontSize:14}}>
                {show?"◉":"○"}
              </button>
            </div>
          </div>

          {err && <div className="adm-err">{err}</div>}

          <button className="adm-btn" onClick={attempt} disabled={loading}
            style={{opacity: loading ? 0.6 : 1, cursor: loading ? "default" : "pointer"}}>
            {loading ? "CONNEXION…" : "ACCÉDER →"}
          </button>

          <div className="adm-hint">connexion sécurisée via supabase auth</div>
        </div>
      </div>
    );
  }

  function AdminRouter() {
    const [session,  setSession]  = React.useState(null);
    const [checking, setChecking] = React.useState(true);
    const [visible,  setVisible]  = React.useState(window.location.hash === "#/admin");

    React.useEffect(() => {
      const onHash = () => setVisible(window.location.hash === "#/admin");
      window.addEventListener("hashchange", onHash);
      return () => window.removeEventListener("hashchange", onHash);
    }, []);

    React.useEffect(() => {
      /* use cached session first for instant feedback */
      if (_activeSession) { setSession(_activeSession); setChecking(false); }
      /* then verify with Supabase */
      _supa.auth.getSession().then(({ data }) => {
        const sess = data?.session || null;
        setSession(sess);
        _activeSession = sess;
        setChecking(false);
      });
      const { data: { subscription } } = _supa.auth.onAuthStateChange((_event, sess) => {
        setSession(sess);
        _activeSession = sess;
      });
      return () => subscription.unsubscribe();
    }, []);

    if (!visible) return null;

    if (checking) return (
      <div className="adm-overlay">
        <div style={{fontFamily:"JetBrains Mono,monospace",fontSize:10,letterSpacing:"0.3em",color:"var(--gold)"}}>
          VÉRIFICATION SESSION…
        </div>
      </div>
    );

    const handleBack = () => {
      history.pushState("", document.title, window.location.pathname + window.location.search);
      setVisible(false);
    };

    const handleLogout = async () => {
      await _supa.auth.signOut();
      _activeSession = null;
      setSession(null);
      handleBack();
    };

    if (!session) return <AdminLogin onAuth={sess => { setSession(sess); _activeSession = sess; }} onBack={handleBack} />;
    return <AdminDashboard onLogout={handleLogout} userEmail={session.user?.email} />;
  }

  const _am = document.createElement("div");
  _am.id = "admin-root";
  document.body.appendChild(_am);
  ReactDOM.createRoot(_am).render(<AdminRouter/>);
  </script>

            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {(D.social || []).map(s => (
                <a key={s.label} href={s.url} style={{fontFamily:"Inter,sans-serif",fontSize:12,color:"var(--bone)",textDecoration:"none",opacity:0.7}}>↗ {s.label}</a>
              ))}
            </div>
          </div>
        </div>
      </>
    );
  }

  const _mn = document.createElement("div");
  document.body.appendChild(_mn);
  ReactDOM.createRoot(_mn).render(<MobileNav />);
  </script>

</body>
</html>
